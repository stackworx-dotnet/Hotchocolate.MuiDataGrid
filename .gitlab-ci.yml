include:
  - project: "stackworx.io/gitlab/ci-templates"
    file: "/Library.gitlab-ci.v1.yml"

.build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:6.0
  cache:
    paths:
      - .nuget/packages

build:format:
  extends: .build
  image: node:16-buster
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules
  script:
    - npm ci
    - npm run check

build:
  extends: .build
  script:
    - dotnet restore
    - dotnet test --no-restore

build:publish:
  extends: .build
  rules:
    - if: $CI_COMMIT_TAG
  artifacts:
    paths:
      - out
  script:
    - ./scripts/release.sh
