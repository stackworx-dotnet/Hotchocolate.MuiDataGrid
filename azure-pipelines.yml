trigger:
  - main

pool:
  name: 'Linode'

resources:
  repositories:
    - repository: templates
      name: BuildTemplates/templates
      type: git

variables:
  - name: NUGET_PACKAGES
    value: $(Pipeline.Workspace)/.nuget/packages
  - name: npm_config_cache
    value: $(Pipeline.Workspace)/.npm/packages

stages:
  - stage: Format
    jobs:
      - job: Dprint
        steps:
          - template: dprint-format.yml@templates
            parameters:
              npmToken: $(GITLAB_NPM_TOKEN)
              nodeVersion: '20.x'
              cachePath: ${{ variables.npm_config_cache }}
              
  - stage: Build
    jobs:
      - job: Build
        steps:
          - task: UseDotNet@2
            displayName: Install DotNet Core
            inputs:
              packageType: 'sdk'
              useGlobalJson: true
              includePreviewVersions: true
          - task: DotNetCoreCLI@2
            displayName: Build Solution
            inputs:
              command: 'build'

  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
      - stage: Publish
        jobs:
          - job: Publish
            steps:
              - task: UseDotNet@2
                displayName: Install DotNet Core
                inputs:
                  packageType: 'sdk'
                  useGlobalJson: true
                  includePreviewVersions: true
              - task: NuGetToolInstaller@1
                displayName: Install NuGet Tool
              - task: DotNetCoreCLI@2
                displayName: Restore Solution
                inputs:
                  command: 'restore'
              - task: DotNetCoreCLI@2
                displayName: Pack
                inputs:
                  command: pack
                  versioningScheme: byPrereleaseNumber
                  majorVersion: '1'
                  minorVersion: '0'
                  patchVersion: '0'
              - task: DotNetCoreCLI@2
                displayName: Push
                inputs:
                  command: 'push'
                  searchPatternPush: '$(Build.ArtifactStagingDirectory)/*.nupkg'
                  feedPublish: 'stackworx'