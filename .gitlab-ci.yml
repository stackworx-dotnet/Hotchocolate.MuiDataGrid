include:
  - project: "stackworx.io/gitlab/ci-templates"
    file: "/Library.gitlab-ci.v1.yml"

.build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:6.0
  cache:
    paths:
      - .nuget/packages

build:format:
  extends: .build
  image: node:16-buster
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules
  script:
    - npm ci
    - npm run check

build:
  extends: .build
  script:
    - dotnet restore
    - dotnet test --no-restore

build:publish:
  extends: .build
  rules:
    - if: $CI_COMMIT_TAG
  artifacts:
    paths:
      - out
  script:
    - dotnet restore
    - dotnet pack --output out -p:SymbolPackageFormat=snupkg --no-build --include-symbols --include-source /p:Version=$CI_COMMIT_REF_NAME
    - dotnet nuget add source "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/nuget/index.json" --name gitlab --username gitlab-ci-token --password $CI_JOB_TOKEN --store-password-in-clear-text
    - dotnet nuget push "./out/*.nupkg" --source gitlab
