trigger:
  - main

pool:
  name: 'Linode'

resources:
  repositories:
    - repository: templates
      name: BuildTemplates/templates
      type: git

variables:
  - name: NUGET_PACKAGES
    value: $(Pipeline.Workspace)/.nuget/packages
  - name: npm_config_cache
    value: $(Pipeline.Workspace)/.npm/packages

stages:
  - stage: Format
    jobs:
      - job: Dprint
        steps:
          - template: dprint-format.yml@templates
            parameters:
              npmToken: $(GITLAB_NPM_TOKEN)
              nodeVersion: '20.x'
              cachePath: ${{ variables.npm_config_cache }}

  - stage: Build
    jobs:
      - job: Build
        steps:
          - task: UseDotNet@2
            displayName: Install DotNet Core
            inputs:
              version: 9.0.100
          - task: DotNetCoreCLI@2
            displayName: Build Solution
            inputs:
              command: 'build'
              projects: 'src/Hotchocolate.MuiDataGrid/Hotchocolate.MuiDataGrid.csproj'

  - stage: Test
    dependsOn: Build
    jobs:
      - job: IntegrationTests
        displayName: Integration Tests
        steps:
          - task: UseDotNet@2
            displayName: Install DotNet Core
            inputs:
              version: 9.0.100
          - task: Bash@3
            displayName: Run Tests
            inputs:
              targetType: inline
              script: |
                ./scripts/tests.sh
          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testRunner: VSTest
              testResultsFiles: '**/*.trx'

  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
      - stage: Publish
        dependsOn: Test
        jobs:
          - job: Publish
            steps:
              - task: UseDotNet@2
                displayName: Install DotNet Core
                inputs:
                  version: 9.0.100
              - task: NuGetToolInstaller@1
                displayName: Install NuGet Tool
              - task: DotNetCoreCLI@2
                displayName: Restore Solution
                inputs:
                  command: 'restore'
              - task: DotNetCoreCLI@2
                displayName: Pack
                inputs:
                  command: pack
                  versioningScheme: byPrereleaseNumber
                  majorVersion: '2'
                  minorVersion: '0'
                  patchVersion: '0'
              - task: DotNetCoreCLI@2
                displayName: Push
                inputs:
                  command: 'push'
                  searchPatternPush: '$(Build.ArtifactStagingDirectory)/*.nupkg'
                  feedPublish: 'stackworx'